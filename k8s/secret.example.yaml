# Copy this to secret.yaml and fill in your real values (base64-encoded).
# NEVER commit secret.yaml to git.
#
# To base64-encode a value:
#   echo -n 'your-value' | base64
#
# To base64-encode the service account JSON file:
#   base64 -w0 secrets/service-account.json
#
# Apply with:
#   kubectl apply -f k8s/secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: booking-calendar-secret
  namespace: booking-calendar
type: Opaque
data:
  GOOGLE_API_KEY: <base64-encoded-api-key>
  GOOGLE_SERVICE_ACCOUNT_EMAIL: <base64-encoded-service-account-email>
  GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: <base64-encoded-private-key>
  service-account.json: <base64-encoded-json-file-contents>
